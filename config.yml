backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - file: "content/home.yml"
        label: "Home Page"
        name: "home"
        format: "yml"
        fields:

          # ---------- HERO SECTION ----------
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Band Name", name: "band_name", widget: "string", default: "Cassette karvaan" }
              - { label: "Tagline", name: "tagline", widget: "string", default: "Where Sound Meets Soul" }
              - { label: "Button Text", name: "button_text", widget: "string", default: "Book Us" }

          # ---------- ABOUT / STORY SECTION ----------
          - label: "About Section"
            name: "about"
            widget: "object"
            fields:
              - { label: "Eyebrow Label", name: "label", widget: "string", default: "Who We Are" }
              - { label: "Heading", name: "heading", widget: "string", default: "The Story of karvaan" }
              - { label: "Paragraph 1", name: "paragraph_1", widget: "text" }
              - { label: "Paragraph 2", name: "paragraph_2", widget: "text" }
              - label: "Band Photos"
                name: "photos"
                widget: "list"
                fields:
                  - { label: "Image", name: "image", widget: "image" }
                  - { label: "Alt Text / Caption", name: "alt", widget: "string" }

          # ---------- LINEUP SECTION ----------
          - label: "Lineup Section"
            name: "lineup"
            widget: "object"
            fields:
              - { label: "Eyebrow Label", name: "label", widget: "string", default: "Meet the lineup" }
              - { label: "Heading", name: "heading", widget: "string", default: "Behind The Sound" }
              - { label: "Paragraph", name: "paragraph", widget: "text" }
              - label: "Band Members"
                name: "members"
                widget: "list"
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Role / Instrument", name: "role", widget: "string" }
                  - label: "Icon"
                    name: "icon"
                    widget: "select"
                    options: ["Mic", "Keyboard", "Guitar", "Clap", "Default"]
                    default: "Default"
                  - { label: "Photo", name: "photo", widget: "image", required: false }

          # ---------- PERFORMANCES SECTION ----------
          - label: "Performances Section"
            name: "performances"
            widget: "object"
            fields:
              - { label: "Eyebrow Label", name: "label", widget: "string", default: "On Stage" }
              - { label: "Heading", name: "heading", widget: "string", default: "Live Performances" }
              - label: "Shows"
                name: "shows"
                widget: "list"
                fields:
                  - { label: "Date", name: "date", widget: "date", format: "DD MMM YYYY" }
                  - { label: "Venue", name: "venue", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - label: "Status"
                    name: "status"
                    widget: "select"
                    options: ["Completed", "Upcoming"]
                    default: "Upcoming"

          # ---------- CONTACT SECTION ----------
          - label: "Contact Section"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Eyebrow Label", name: "label", widget: "string", default: "Get In Touch" }
              - { label: "Heading", name: "heading", widget: "string", default: "Book Us or Say Hello" }
              - { label: "Paragraph", name: "paragraph", widget: "text" }
              - { label: "Email Address", name: "email", widget: "string" }
              - { label: "Instagram Handle", name: "instagram_handle", widget: "string", default: "@cassette_karvaan" }
              - { label: "Instagram URL", name: "instagram_url", widget: "string" }
              - { label: "Contact Name", name: "contact_name", widget: "string" }
              - { label: "Phone Number", name: "phone", widget: "string" }

          # ---------- FOOTER ----------
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Tagline / Band Name", name: "band_name", widget: "string", default: "Cassette karvaan" }
              - { label: "Location", name: "location", widget: "string", default: "Mysuru, Karnataka" }
              - { label: "Copyright Text", name: "copyright", widget: "string", default: "© 2026 Cassette karvaan · Made with ♫ & ❤️" }
