backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "announcements"
    label: "Ticker Announcement"
    folder: "data"
    format: "json"
    create: true
    slug: "ticker"
    fields:
      - { label: "Show Text", name: "text", widget: "string" }
      - { label: "Location", name: "location", widget: "string" }
