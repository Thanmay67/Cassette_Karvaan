about:
  label: Who We Are
  heading: The Story of karvaan
  paragraph_1: Cassette karvaan is a fresh, passionate band born out of a shared
    love for the timeless sounds. We believe music is a journey — a karvaan —
    that carries stories, nostalgia, and pure joy.
  paragraph_2: We started small, with a few friends who couldn't stop humming old
    film melodies. That hum turned into rehearsals, rehearsals turned into
    performances, and now we're bringing these golden songs to live audiences in
    Mysuru and beyond.
