performances:
  label: On Stage
  heading: Live Performances
  shows:
    - date: 2026-05-02
      venue: Kuppalli Kaapi — Mysuru
      description: Our debut performance at Kuppalli Kaapi, Mysore, was pure magic.
        Surrounded by great coffee and incredible local energy, we turned our
        nervous excitement into an unforgettable first gig. We couldn't have
        asked for a better crowd to kick off our musical journey!
      status: Completed
    - date: 2026-05-16
      venue: Fisherman's Wharf — Mysuru
      description: Our second performance brought the house down at The Fisherman's
        Wharf, Mysore! Trading the cozy cafe vibe for a lively coastal energy,
        we took the stage under the stars and played to an incredible,
        high-spirited crowd. Big love to everyone who came out to catch the
        music, dance, and support our second gig—this journey is only getting
        better!
      status: Completed
    - date: 2026-05-30
      venue: Fisherman's Wharf — Mysuru
      description: We returned to The Fisherman's Wharf for our third performance,
        taking the stage for a second time at the venue. The evening featured
        another live set under the stars for the attending crowd. This marks our
        third official show since the band's debut.
      status: Completed
    - date: 2026-06-26
      venue: University of Mysore — Dept of Arts
      description: We are pleased to announce our upcoming fourth performance, which
        will take place at the Department of Arts, University of Mysore.
        Following our recent engagements at local venues, this upcoming event
        marks a significant transition to an academic and cultural setting. The
        performance will highlight our evolving repertoire for the university
        community.
      status: Upcoming
